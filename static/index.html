<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Language Recognition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;font-size:2rem;margin-bottom:8px;color:#38bdf8}
.sub{text-align:center;color:#94a3b8;margin-bottom:20px}
.vid-box{position:relative;max-width:640px;margin:0 auto 16px;border-radius:12px;overflow:hidden;border:2px solid #334155}
video{width:100%;display:block;transform:scaleX(-1)}
canvas{display:none}
.ctrls{display:flex;gap:12px;justify-content:center;margin-bottom:16px}
button{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.bp{background:#3b82f6;color:#fff}.bp:hover{background:#2563eb}
.bd{background:#ef4444;color:#fff}.bd:hover{background:#dc2626}
.upload{text-align:center;margin-bottom:16px}
.upload label{display:inline-block;padding:10px 20px;background:#334155;border-radius:8px;cursor:pointer}
.upload input{display:none}
.status{text-align:center;padding:8px;color:#94a3b8}
.result{background:#1e293b;border-radius:12px;padding:24px;margin-top:16px;border:1px solid #334155;display:none}
.pred{font-size:2.5rem;font-weight:700;text-align:center;color:#38bdf8}
.conf{text-align:center;color:#94a3b8;margin-top:4px}
.bar-bg{height:8px;background:#334155;border-radius:4px;margin-top:12px}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#38bdf8,#818cf8);transition:width .3s}
.probs{margin-top:16px}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pr .l{width:90px;text-align:right;font-size:.85rem;color:#94a3b8}
.pr .bg{flex:1;height:5px;background:#334155;border-radius:3px}
.pr .fg{height:100%;border-radius:3px;background:#38bdf8;transition:width .3s}
.pr .v{width:45px;font-size:.8rem;color:#64748b}
</style>
</head>
<body>
<div class="container">
<h1>Sign Language Recognition</h1>
<p class="sub">MediaPipe + TensorFlow real-time detection</p>
<div class="vid-box"><video id="vid" autoplay playsinline></video><canvas id="cv"></canvas></div>
<div class="ctrls">
<button class="bp" id="startBtn" onclick="startCam()">Start Camera</button>
<button class="bd" id="stopBtn" onclick="stopAll()" style="display:none">Stop</button>
<button class="bp" id="detBtn" onclick="startDet()" style="display:none">Detect</button>
</div>
<div class="upload"><label for="fu">Or upload an image</label><input type="file" id="fu" accept="image/*" onchange="upImg(event)"></div>
<div id="st" class="status">Click Start Camera to begin</div>
<div id="res" class="result">
<div id="pred" class="pred"></div>
<div id="confT" class="conf"></div>
<div class="bar-bg"><div id="confF" class="bar-fill" style="width:0"></div></div>
<div id="probs" class="probs"></div>
</div>
</div>
<script>
const vid=document.getElementById('vid'),cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let stream=null,det=false,intv=null;
async function startCam(){
try{stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
vid.srcObject=stream;$('startBtn').style.display='none';$('detBtn').style.display='';$('stopBtn').style.display='';
$('st').textContent='Camera ready. Click Detect.';}catch(e){$('st').textContent='Error: '+e.message}}
function startDet(){det=true;$('detBtn').style.display='none';$('st').textContent='Detecting...';intv=setInterval(cap,1000)}
function stopAll(){det=false;if(intv)clearInterval(intv);if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
vid.srcObject=null;$('startBtn').style.display='';$('detBtn').style.display='none';$('stopBtn').style.display='none';$('st').textContent='Stopped.'}
async function cap(){if(!det)return;cv.width=vid.videoWidth;cv.height=vid.videoHeight;ctx.drawImage(vid,0,0);
const d=cv.toDataURL('image/jpeg',0.8);
try{const r=await fetch('/predict/base64',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:d})});
const j=await r.json();j.error?$('st').textContent=j.error:show(j)}catch(e){$('st').textContent='Error: '+e.message}}
async function upImg(e){const f=e.target.files[0];if(!f)return;const fd=new FormData();fd.append('file',f);$('st').textContent='Analyzing...';
try{const r=await fetch('/predict',{method:'POST',body:fd});const j=await r.json();j.error?$('st').textContent=j.error:(show(j),$('st').textContent='Done!')}
catch(e){$('st').textContent='Error: '+e.message}}
function show(d){$('res').style.display='';$('pred').textContent=d.prediction;
const c=(d.confidence*100).toFixed(1);$('confT').textContent='Confidence: '+c+'%';$('confF').style.width=c+'%';
$('st').textContent=d.prediction+' ('+c+'%)';const p=$('probs');p.innerHTML='';
if(d.all_probabilities){Object.entries(d.all_probabilities).sort((a,b)=>b[1]-a[1]).forEach(([l,v])=>{
const pc=(v*100).toFixed(1);p.innerHTML+=`<div class="pr"><span class="l">${l}</span><div class="bg"><div class="fg" style="width:${pc}%"></div></div><span class="v">${pc}%</span></div>`})}}
function $(id){return document.getElementById(id)}
</script>
</body>
</html>
