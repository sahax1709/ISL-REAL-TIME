<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISLDetect — Indian Sign Language Recognition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0f;--bg2:#12121a;--card:#1a1a26;--card-h:#222233;--accent:#6c5ce7;--accent-l:#a29bfe;--accent-g:rgba(108,92,231,.3);--ok:#00cec9;--ok-g:rgba(0,206,201,.3);--warn:#fdcb6e;--danger:#ff6b6b;--t1:#f0f0f5;--t2:#8888a0;--t3:#555568;--hindi:#ff9f43;--hindi-g:rgba(255,159,67,.25);--border:#2a2a3d;--r:16px;--rs:10px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(108,92,231,.08),transparent),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(0,206,201,.06),transparent);pointer-events:none;z-index:0}
        .header{position:relative;z-index:1;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(10,10,15,.8)}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--ok));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
        .logo-text{font-size:20px;font-weight:700;letter-spacing:-.5px}
        .logo-text span{color:var(--accent-l)}
        .badge{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card)}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--danger);transition:.3s}
        .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok-g);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .main{position:relative;z-index:1;display:grid;grid-template-columns:1fr 360px;gap:22px;padding:22px 28px;max-width:1400px;margin:0 auto}
        @media(max-width:1024px){.main{grid-template-columns:1fr;padding:14px}}
        .cam-sec{display:flex;flex-direction:column;gap:18px}
        .cam-box{position:relative;border-radius:var(--r);overflow:hidden;background:var(--bg2);border:1px solid var(--border);aspect-ratio:4/3;max-height:520px}
        #webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
        #lm-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
        .cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg2);transition:opacity .4s}
        .cam-overlay.hide{opacity:0;pointer-events:none}
        .cam-overlay-c{text-align:center}
        .cam-overlay-c .ico{font-size:44px;margin-bottom:14px}
        .cam-overlay-c p{color:var(--t2);font-size:14px;margin-top:6px}
        .result{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;padding:22px 26px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);min-height:100px;transition:.3s}
        .result.on{border-color:var(--accent);box-shadow:0 0 28px var(--accent-g)}
        .res-en{text-align:left}.res-hi{text-align:right}
        .res-label{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--t3);margin-bottom:5px}
        .res-en .val{font-size:34px;font-weight:700;color:var(--accent-l);letter-spacing:-.5px;line-height:1.1}
        .res-hi .val{font-family:'Noto Sans Devanagari',sans-serif;font-size:38px;font-weight:700;color:var(--hindi);line-height:1.1;text-shadow:0 0 18px var(--hindi-g)}
        .res-div{width:1px;height:55px;background:var(--border)}
        .conf-wrap{grid-column:1/-1;margin-top:3px}
        .conf-bg{width:100%;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
        .conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--ok));transition:width .3s;width:0}
        .conf-txt{font-size:10px;color:var(--t3);margin-top:3px;font-family:'JetBrains Mono',monospace}
        .ctrls{display:flex;gap:10px}
        .btn{flex:1;padding:13px 22px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
        .btn:hover{background:var(--card-h);transform:translateY(-1px)}
        .btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
        .btn-p:hover{background:#7c6cf7;box-shadow:0 4px 18px var(--accent-g)}
        .btn-d{border-color:var(--danger);color:var(--danger)}
        .btn-d:hover{background:rgba(255,107,107,.1)}
        .sidebar{display:flex;flex-direction:column;gap:18px}
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
        .card-t{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.1px;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:7px}
        .fviz{display:flex;gap:7px;justify-content:center}
        .fi{display:flex;flex-direction:column;align-items:center;gap:5px}
        .fd{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.3s}
        .fd.on{border-color:var(--ok);background:rgba(0,206,201,.15);box-shadow:0 0 10px var(--ok-g)}
        .fl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
        .sdesc{margin-top:8px;padding:10px 14px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--t2);line-height:1.5;border-left:3px solid var(--accent);display:none}
        .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:400px;overflow-y:auto;padding-right:3px}
        .sgrid::-webkit-scrollbar{width:3px}.sgrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .sc{padding:9px 6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;text-align:center;transition:.2s;cursor:default}
        .sc:hover{border-color:var(--accent);background:rgba(108,92,231,.08)}
        .sc.hl{border-color:var(--accent);background:rgba(108,92,231,.15);box-shadow:0 0 10px var(--accent-g)}
        .sc .en{font-size:12px;font-weight:600;color:var(--t1)}
        .sc .hi{font-family:'Noto Sans Devanagari',sans-serif;font-size:13px;font-weight:600;color:var(--hindi);margin-top:1px}
        .hlist{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto}
        .hi-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:7px;font-size:12px;animation:slideIn .3s}
        @keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
        .hi-item .se{font-weight:600;color:var(--accent-l)}
        .hi-item .sh{font-family:'Noto Sans Devanagari';color:var(--hindi)}
        .hi-item .st{color:var(--t3);font-family:'JetBrains Mono';font-size:10px}
        .empty{text-align:center;padding:20px;color:var(--t3);font-size:12px}
        @media(max-width:768px){.header{padding:14px}.main{padding:10px}.res-en .val{font-size:26px}.res-hi .val{font-size:30px}}
    </style>
</head>
<body>
<header class="header">
    <div class="logo"><div class="logo-icon">🤟</div><div class="logo-text">ISL<span>Detect</span></div></div>
    <div class="badge"><div class="dot" id="dot"></div><span id="stxt">Disconnected</span></div>
</header>
<main class="main">
    <div class="cam-sec">
        <div class="cam-box">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="lm-canvas"></canvas>
            <div class="cam-overlay" id="overlay">
                <div class="cam-overlay-c"><div class="ico">📷</div><h3>Camera Off</h3><p>Click "Start Camera" to begin ISL detection</p></div>
            </div>
        </div>
        <div class="result" id="rbanner">
            <div class="res-en"><div class="res-label">Detected Sign</div><div class="val" id="rEn">—</div></div>
            <div class="res-div"></div>
            <div class="res-hi"><div class="res-label">हिंदी</div><div class="val" id="rHi">—</div></div>
            <div class="conf-wrap"><div class="conf-bg"><div class="conf-fill" id="cbar"></div></div><div class="conf-txt" id="ctxt">Confidence: 0%</div></div>
        </div>
        <div class="ctrls">
            <button class="btn btn-p" id="startBtn" onclick="startCam()">▶ Start Camera</button>
            <button class="btn btn-d" id="stopBtn" onclick="stopCam()" style="display:none">■ Stop</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="card">
            <div class="card-t">🖐 Finger States</div>
            <div class="fviz">
                <div class="fi"><div class="fd" id="f-thumb">👍</div><div class="fl">Thumb</div></div>
                <div class="fi"><div class="fd" id="f-index">☝</div><div class="fl">Index</div></div>
                <div class="fi"><div class="fd" id="f-mid">🖕</div><div class="fl">Middle</div></div>
                <div class="fi"><div class="fd" id="f-ring">💍</div><div class="fl">Ring</div></div>
                <div class="fi"><div class="fd" id="f-pink">🤙</div><div class="fl">Pinky</div></div>
            </div>
            <div class="sdesc" id="sdesc"></div>
        </div>
        <div class="card" style="flex:1">
            <div class="card-t">📖 Sign Reference</div>
            <div class="sgrid" id="sgrid"></div>
        </div>
        <div class="card">
            <div class="card-t">📝 Recent Detections</div>
            <div class="hlist" id="hlist"><div class="empty">No detections yet</div></div>
        </div>
    </div>
</main>
<script>
const INTERVAL=150,WSU=`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws`;
const S={"A":{h:"अ",d:"Closed fist, thumb on side"},"B":{h:"ब",d:"Flat hand, 4 fingers up"},"C":{h:"स",d:"Curved hand like a cup"},"D":{h:"ड",d:"Index up, rest curled"},"I":{h:"इ",d:"Only pinky extended"},"L":{h:"ल",d:"L-shape: thumb + index"},"V":{h:"व",d:"Victory/peace sign"},"W":{h:"व",d:"Three fingers up"},"Y":{h:"य",d:"Thumb + pinky extended"},"Hello":{h:"नमस्ते",d:"Open palm, fingers spread"},"Thank You":{h:"धन्यवाद",d:"Flat hand from chin"},"Yes":{h:"हाँ",d:"Thumbs up 👍"},"No":{h:"नहीं",d:"Index + middle closing"},"I Love You":{h:"मैं तुमसे प्यार करता/करती हूँ",d:"Thumb+index+pinky extended"},"OK":{h:"ठीक है",d:"Thumb+index circle"},"Stop":{h:"रुको",d:"Palm forward, fingers together"},"One":{h:"एक",d:"Index finger up"},"Two":{h:"दो",d:"Index+middle up"},"Three":{h:"तीन",d:"Index+middle+ring up"},"Four":{h:"चार",d:"Four fingers, thumb folded"},"Five":{h:"पाँच",d:"All fingers spread"},"Good":{h:"अच्छा",d:"Thumbs up"},"Bad":{h:"बुरा",d:"Thumbs down"},"Peace":{h:"शांति",d:"Victory sign"},"Rock":{h:"रॉक",d:"Index+pinky extended 🤘"}};
let ws,stream,fint,hist=[],lastS='';
const $=id=>document.getElementById(id);
const vid=$('webcam'),cvs=$('lm-canvas'),ctx=cvs.getContext('2d');

const sgrid=$('sgrid');
Object.entries(S).forEach(([k,v])=>{const d=document.createElement('div');d.className='sc';d.id=`c-${k}`;d.innerHTML=`<div class="en">${k}</div><div class="hi">${v.h}</div>`;d.title=v.d;sgrid.appendChild(d);});

function connectWS(){ws=new WebSocket(WSU);ws.onopen=()=>{$('dot').classList.add('on');$('stxt').textContent='Connected';};ws.onmessage=e=>handle(JSON.parse(e.data));ws.onclose=()=>{$('dot').classList.remove('on');$('stxt').textContent='Disconnected';setTimeout(()=>{if(stream)connectWS();},2000);};ws.onerror=e=>console.error('WS error',e);}

async function startCam(){try{stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});vid.srcObject=stream;$('overlay').classList.add('hide');$('startBtn').style.display='none';$('stopBtn').style.display='flex';connectWS();vid.onloadedmetadata=()=>{cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;startCapture();};}catch(e){alert('Camera access denied');console.error(e);}}

function stopCam(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}if(ws){ws.close();ws=null;}if(fint){clearInterval(fint);fint=null;}$('overlay').classList.remove('hide');$('startBtn').style.display='flex';$('stopBtn').style.display='none';ctx.clearRect(0,0,cvs.width,cvs.height);$('rEn').textContent='—';$('rHi').textContent='—';$('cbar').style.width='0';$('ctxt').textContent='Confidence: 0%';$('rbanner').classList.remove('on');}

function startCapture(){const sc=document.createElement('canvas');sc.width=640;sc.height=480;const sctx=sc.getContext('2d');fint=setInterval(()=>{if(ws&&ws.readyState===1){sctx.drawImage(vid,0,0,640,480);ws.send(JSON.stringify({type:'frame',data:sc.toDataURL('image/jpeg',0.65)}));}},INTERVAL);}

const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

function drawLM(lms){ctx.clearRect(0,0,cvs.width,cvs.height);const w=cvs.width,h=cvs.height;const pts=lms.map(l=>({x:(1-l.x)*w,y:l.y*h}));ctx.strokeStyle='rgba(108,92,231,0.7)';ctx.lineWidth=2.5;CONN.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.stroke();});pts.forEach((p,i)=>{const tip=[4,8,12,16,20].includes(i),r=tip?6:4;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=tip?'#00cec9':'#a29bfe';ctx.fill();if(tip){ctx.strokeStyle='rgba(0,206,201,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.stroke();}});}

function handle(d){if(d.detected&&d.sign&&d.sign!=='Unknown'&&d.sign!=='Detecting...'){$('rEn').textContent=d.sign;$('rHi').textContent=d.hindi;$('cbar').style.width=`${d.confidence*100}%`;$('ctxt').textContent=`Confidence: ${Math.round(d.confidence*100)}%`;$('rbanner').classList.add('on');if(S[d.sign]){$('sdesc').textContent=`${d.sign} (${d.hindi}): ${S[d.sign].d}`;$('sdesc').style.display='block';}document.querySelectorAll('.sc').forEach(c=>c.classList.remove('hl'));const ch=document.getElementById(`c-${d.sign}`);if(ch)ch.classList.add('hl');if(d.finger_states){const n=['thumb','index','mid','ring','pink'];d.finger_states.forEach((s,i)=>{const el=$(`f-${n[i]}`);if(el){s?el.classList.add('on'):el.classList.remove('on');}});}if(d.sign!==lastS){lastS=d.sign;addHist(d.sign,d.hindi);}if(d.landmarks)drawLM(d.landmarks);}else{ctx.clearRect(0,0,cvs.width,cvs.height);if(!d.detected)$('rbanner').classList.remove('on');}}

function addHist(s,h){const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});hist.unshift({s,h,t});if(hist.length>20)hist.pop();$('hlist').innerHTML=hist.slice(0,8).map(x=>`<div class="hi-item"><span class="se">${x.s}</span><span class="sh">${x.h}</span><span class="st">${x.t}</span></div>`).join('');}
</script>
</body>
</html>
